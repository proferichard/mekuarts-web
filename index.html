    @import url('https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Patrick+Hand&family=Quicksand:wght@400;500;600;700&family=Parisienne&display=swap');

    :root {

      --meku-pink-100:   #FBBADC;
      --meku-pink-200:   #F77FBE;
      --meku-pink-300:   #F244A0;
      --meku-pink-400:   #ED008C;
      --meku-pink-500:   #C70076;
      --meku-pink-600:   #9F005E;
      --meku-pink-700:   #770046;

      --meku-green:      #51B94A;

      --meku-butter:     #FFF4D6;
      --meku-lavender:   #E8DAF5;
      --meku-peach:      #FFD9C2;

      --meku-paper:      #FFFBF4;
      --meku-paper-2:    #FAF3E4;
      --meku-ink:        #3D2A4A;
      --meku-ink-2:      #6B5775;
      --meku-ink-3:      #9B8AA3;
      --meku-line:       #EFE4D2;

      --bg:              var(--meku-paper);
      --fg-1:            var(--meku-ink);
      --fg-2:            var(--meku-ink-2);
      --fg-3:            var(--meku-ink-3);

      --shadow-sm:  0 1px 2px rgba(61,42,74,.06), 0 1px 1px rgba(61,42,74,.04);
      --shadow-md:  0 4px 12px rgba(61,42,74,.08), 0 2px 4px rgba(61,42,74,.05);
      --shadow-lg:  0 12px 32px rgba(61,42,74,.12), 0 4px 12px rgba(61,42,74,.06);

      --radius-md: 16px; --radius-lg: 24px; --radius-xl: 32px;

      --ease-bounce: cubic-bezier(.34,1.56,.64,1);
      --ease-soft:   cubic-bezier(.4,0,.2,1);

      --font-display: 'Caveat Brush', 'Patrick Hand', cursive;
      --font-hand:    'Patrick Hand', cursive;
      --font-body:    'Quicksand', system-ui, sans-serif;
      --font-script:  'Parisienne', cursive;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--fg-1);
      font-family: var(--font-body);
      font-size: 16px; line-height: 1.55; font-weight: 500;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      max-width: 100vw;
    }
    main { display: block; }
    section { scroll-margin-top: 80px; }

    h1,h2,h3 { font-family: var(--font-display); color: var(--fg-1); line-height: 1.1; letter-spacing: -0.01em; font-weight: 400; margin: 0 0 16px; }
    h4 { font-family: var(--font-body); font-weight: 700; font-size: 1.5rem; margin: 0 0 12px; }
    p { color: var(--fg-2); margin: 0 0 16px; }
    a { color: var(--accent); }
    img { max-width: 100%; height: auto; }
    ::selection { background: var(--meku-pink-200); color: var(--meku-pink-700); }

    .eyebrow { font-family: var(--font-body); font-size: .75rem; letter-spacing: .18em; text-transform: uppercase; color: var(--meku-pink-500); font-weight: 700; }

    @keyframes mekuFloat {
      0%,100% { transform: translateY(0) rotate(var(--r,0deg)); }
      50%      { transform: translateY(-6px) rotate(var(--r,0deg)); }
    }
    @keyframes mekuTwinkle {
      0%,100% { opacity:.6; transform:scale(1); }
      50%      { opacity:1;  transform:scale(1.15); }
    }

    .meku-nav a:hover { color: var(--meku-pink) !important; }
    .ig-tile:hover  { transform: translateY(-4px) rotate(-1deg); box-shadow: var(--shadow-md); }
    .map-card:hover { transform: rotate(-0.5deg) translateY(-3px); }
    .big-cta:hover  { transform: translateY(-3px); box-shadow: 0 11px 0 rgba(61,42,74,.18); }
    .big-cta:active { transform: translateY(2px);  box-shadow: 0 4px  0 rgba(61,42,74,.18); }

    /* ─── TABLET ─── */
    @media (max-width: 900px) {
      .meku-nav { display: none !important; }
      .sobre-grid, .ig-grid, .map-grid {
        grid-template-columns: 1fr !important;
        gap: 32px !important;

      .hero-h1 { font-size: clamp(56px, 11vw, 80px) !important; }
      .hero-pretitle { font-size: 28px !important; }
      .float-tag-1 { right: 18px !important; top: 18px !important; }
      .float-tag-2 { right: 18px !important; top: 70px !important; }
    }

    /* ─── MOBILE ─── */
    @media (max-width: 640px) {
      section { scroll-margin-top: 70px; }

      /* Header */
      .meku-header { padding: 10px 14px !important; }
      .meku-header-logo { height: 36px !important; }
      .meku-header-cta { padding: 9px 14px !important; font-size: 13px !important; gap: 6px !important; }
      .meku-header-cta-label { display: none; }

      /* Hero */
      .hero-section { padding: 12px 12px 0 !important; }
      .hero-card {
        padding: 32px 22px 48px !important;
        min-height: auto !important;
        border-radius: 24px !important;
      }
      .hero-eyebrow { font-size: 10px !important; letter-spacing: .14em !important; margin-bottom: 10px !important; }
      .hero-pretitle { font-size: 22px !important; margin-bottom: 4px !important; }
      .hero-h1 { font-size: clamp(44px, 13vw, 60px) !important; margin: 0 0 16px !important; }
      .hero-lede { font-size: 15px !important; line-height: 1.5 !important; margin: 0 0 22px !important; }
      .hero-cta-primary { padding: 13px 20px !important; font-size: 14px !important; gap: 8px !important; }
      .hero-cta-ghost { padding: 13px 18px !important; font-size: 14px !important; }
      .hero-trust { gap: 10px 14px !important; margin-top: 28px !important; }
      .hero-trust-item { font-size: 12px !important; }
      .hero-trust-item span { font-size: 16px !important; }
      .hero-trust-dot { display: none !important; }
      .hero-ribbon { display: none !important; }

      .float-tag-1 {
        top: 12px !important; right: 12px !important;
        font-size: 14px !important;
        padding: 5px 11px !important;
      }
      .float-tag-2 {
        top: 52px !important; right: 12px !important;
        font-size: 13px !important;
        padding: 5px 11px !important;
      }

      /* Sobre */
      .sobre-section { padding: 56px 18px 32px !important; }
      .sobre-grid { gap: 28px !important; }
      .sobre-h2 { font-size: 48px !important; margin: 0 0 18px !important; }
      .sobre-text p { font-size: 16px !important; }
      .sobre-quote { padding: 20px 22px !important; }
      .sobre-quote p { font-size: 22px !important; }

      .sobre-visual { min-height: 300px !important; }
      .sobre-visual-inner { width: 220px !important; height: 300px !important; }
      .letter-tag {
        width: 84px !important; height: 96px !important;
        font-size: 60px !important;
        border-radius: 12px 12px 18px 18px / 12px 12px 24px 24px !important;
      }
      .letter-tag-m { top: 10px !important; left: 10px !important; }
      .letter-tag-e { top: 28px !important; left: 110px !important; }
      .letter-tag-k { top: 120px !important; left: 30px !important; }
      .letter-tag-u { top: 138px !important; left: 130px !important; }
      .arts-row { top: 248px !important; left: 40px !important; }

      /* Hacemos */
      .hacemos-section {
        padding: 48px 18px !important;
        margin: 16px 12px 0 !important;
        border-radius: 24px !important;
      }
      .hacemos-h2 { font-size: 44px !important; }
      .hacemos-grid { grid-template-columns: 1fr !important; gap: 20px !important; }
      .craft-card { padding: 18px !important; }
      .craft-card-image { height: 120px !important; font-size: 60px !important; }
      .craft-card-title { font-size: 28px !important; }

      .process-strip { padding: 22px !important; margin-top: 48px !important; }
      .process-row { flex-direction: column !important; align-items: flex-start !important; gap: 18px !important; }
      .process-steps { gap: 14px !important; flex-direction: column !important; align-items: flex-start !important; }
      .process-arrow { display: none !important; }
      .process-h3 { font-size: 30px !important; }

      /* Instagram */
      .ig-section { padding: 56px 18px 32px !important; }
      .ig-h2 { font-size: 44px !important; }
      .ig-grid-tiles { gap: 8px !important; }

      /* Visitanos */
      .visitanos-section {
        padding: 48px 18px !important;
        margin: 16px 12px 0 !important;
        border-radius: 24px !important;
      }
      .visitanos-h2 { font-size: 44px !important; }
      .visitanos-sub { font-size: 22px !important; }
      .map-card { padding: 10px !important; transform: rotate(-0.5deg) !important; }
      .map-tag { top: 18px !important; right: 14px !important; font-size: 14px !important; padding: 5px 10px !important; }
      .map-open-btn { bottom: 18px !important; left: 18px !important; padding: 8px 14px !important; font-size: 13px !important; }
      .address-card { padding: 22px !important; transform: rotate(0.5deg) !important; }
      .address-card h3 { font-size: 26px !important; }
      .info-row-icon { width: 38px !important; height: 38px !important; font-size: 18px !important; }
      .info-row-title { font-size: 15px !important; }
      .info-row-sub   { font-size: 14px !important; }

      /* Contact */
      .contact-section { padding: 56px 14px 32px !important; }
      .contact-card { padding: 48px 22px !important; border-radius: 24px !important; }
      .contact-pretitle { font-size: 26px !important; }
      .contact-h2 { font-size: 50px !important; }
      .contact-lede { font-size: 15px !important; margin: 0 auto 26px !important; }
      .contact-cta {
        padding: 16px 22px !important;
        font-size: 16px !important;
        gap: 10px !important;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 100%;
      }
      .contact-deco-tag { display: none !important; }
      .contact-links { font-size: 13px !important; gap: 12px !important; margin-top: 22px !important; }

      /* Footer */
      .footer { padding: 28px 18px 22px !important; }
      .footer-row { flex-direction: column !important; align-items: flex-start !important; gap: 14px !important; text-align: left; }
      .footer-tagline { font-size: 16px !important; }
    }

    /* ─── VERY SMALL ─── */
    @media (max-width: 380px) {
      .hero-h1 { font-size: 40px !important; }
      .contact-h2 { font-size: 42px !important; }
      .float-tag-1, .float-tag-2 { display: none !important; }
      .sobre-h2 { font-size: 42px !important; }
      .hacemos-h2, .ig-h2, .visitanos-h2 { font-size: 38px !important; }
      .arts-row { transform: scale(0.85); transform-origin: top left; }
    }

    /* ─── DINAMISMO / ANIMACIONES ─── */
    @keyframes mekuWiggle {
      0%, 100% { transform: rotate(var(--r,0deg)) scale(1); }
      25%      { transform: rotate(calc(var(--r,0deg) - 6deg)) scale(1.06); }
      75%      { transform: rotate(calc(var(--r,0deg) + 6deg)) scale(1.06); }
    }
    @keyframes mekuPop {
      0%   { transform: scale(0.6) rotate(-8deg); opacity: 0; }
      60%  { transform: scale(1.1) rotate(2deg);  opacity: 1; }
      100% { transform: scale(1)   rotate(0deg);  opacity: 1; }
    }
    @keyframes mekuMarquee {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes mekuPulseGlow {
      0%, 100% { box-shadow: 0 8px 0 rgba(61,42,74,0.18), 0 0 0 0 rgba(237,0,140,0.5); }
      50%      { box-shadow: 0 8px 0 rgba(61,42,74,0.18), 0 0 0 22px rgba(237,0,140,0); }
    }
    @keyframes mekuPinPulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.12); }
    }
    @keyframes mekuDrift {
      0%, 100% { transform: translate(0, 0) rotate(var(--r, 0deg)); }
      33%      { transform: translate(4px, -8px) rotate(calc(var(--r, 0deg) + 2deg)); }
      66%      { transform: translate(-4px, -4px) rotate(calc(var(--r, 0deg) - 2deg)); }
    }
    @keyframes heartFloat {
      0%   { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translate(var(--tx, 0), var(--ty, -120px)) scale(1.4) rotate(var(--rot, 20deg)); }
    }
    @keyframes mekuBlink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.05); }
    }
    @keyframes mekuSpinSlow {
      0%   { transform: rotate(0); }
      100% { transform: rotate(360deg); }
    }
    @keyframes mekuBounceIn {
      0%   { opacity: 0; transform: scale(0.3) rotate(var(--r,0deg)); }
      50%  { opacity: 1; transform: scale(1.08) rotate(var(--r,0deg)); }
      70%  { transform: scale(0.95) rotate(var(--r,0deg)); }
      100% { transform: scale(1) rotate(var(--r,0deg)); }
    }
    @keyframes mekuConfettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 0; }
      10%  { opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    @keyframes mekuShake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-4px); }
      40%, 80% { transform: translateX(4px); }
    }

    /* Reveal-on-scroll */
    .reveal { opacity: 0; transform: translateY(40px); transition: opacity 700ms var(--ease-soft), transform 700ms var(--ease-bounce); will-change: opacity, transform; }
    .reveal.is-visible { opacity: 1; transform: translateY(0); }

    /* Decorative tags: drift continuously, wiggle on hover */
    .deco-tag { cursor: pointer; transition: transform 220ms var(--ease-bounce); animation: mekuDrift 5s ease-in-out infinite; }
    .deco-tag:hover { animation: mekuWiggle 600ms var(--ease-bounce) !important; }

    /* Big WhatsApp CTA: continuous pulse glow */
    .big-cta { animation: mekuPulseGlow 2.4s ease-out infinite; }
    .big-cta:hover { animation: none; }

    /* Hero header CTA: subtle bounce on hover */
    .meku-header-cta:hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 6px 0 var(--meku-pink-600) !important; }

    /* Logo sway on hover */
    .meku-header-logo { transition: transform 240ms var(--ease-bounce); }
    .meku-header-logo:hover { animation: mekuWiggle 700ms var(--ease-bounce); }

    /* Letter tags: bounce-in on hover */
    .letter-tag { cursor: pointer; transition: filter 220ms var(--ease-soft); }
    .letter-tag:hover { animation: mekuBounceIn 600ms var(--ease-bounce) !important; filter: brightness(1.06); z-index: 5; }

    /* Craft cards: wiggle the icon area on hover */
    .craft-card:hover .craft-card-image { animation: mekuWiggle 700ms var(--ease-bounce); }
    .craft-card:hover .craft-card-tag { animation: mekuWiggle 600ms var(--ease-bounce); }

    /* IG tiles: playful hover wiggle */
    .ig-tile { transition: transform 220ms var(--ease-bounce), box-shadow 220ms var(--ease-soft); }
    .ig-tile:hover { animation: mekuWiggle 650ms var(--ease-bounce); box-shadow: var(--shadow-md); z-index: 2; }

    /* Map card hover lift */
    .map-card:hover { transform: rotate(-0.5deg) translateY(-4px) !important; }
    .map-card:hover .map-tag { animation: mekuWiggle 600ms var(--ease-bounce); }

    /* Map pin pulse */
    .map-pin-pulse { transform-box: fill-box; transform-origin: center bottom; animation: mekuPinPulse 1.6s ease-in-out infinite; }

    /* Step circles: spin on hover */
    .process-step-circle { transition: transform 500ms var(--ease-bounce); cursor: default; }
    .process-step-circle:hover { transform: rotate(360deg) scale(1.15); }

    /* Marquee strip */
    .meku-marquee {
      overflow: hidden;
      padding: 16px 0;
      background: var(--meku-pink);
      color: #fff;
      transform: rotate(-1.5deg);
      margin: 24px -20px;
      box-shadow: 0 6px 0 var(--meku-pink-600);
      position: relative;
      z-index: 1;
      border-top: 2px dashed rgba(255,255,255,0.4);
      border-bottom: 2px dashed rgba(255,255,255,0.4);
    }
    .meku-marquee-track { display: inline-flex; white-space: nowrap; animation: mekuMarquee 32s linear infinite; font-family: var(--font-display); font-size: 24px; align-items: center; }
    .meku-marquee-track > span { display: inline-flex; align-items: center; padding-right: 36px; }
    .meku-marquee:hover .meku-marquee-track { animation-play-state: paused; }

    /* Heart particles spawned on click */
    .heart-particle { position: fixed; pointer-events: none; font-size: 26px; z-index: 9999; user-select: none; animation: heartFloat 1.4s var(--ease-soft) forwards; }

    /* Confetti particles */
    .confetti-particle { position: fixed; pointer-events: none; width: 10px; height: 14px; z-index: 9998; animation: mekuConfettiFall 2.4s linear forwards; border-radius: 2px; }

    /* Subtle shimmer on hero card border */
    .hero-card { position: relative; }
    .hero-card::after {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.12), transparent 40%);
      pointer-events: none;
      border-radius: inherit;
      animation: mekuDrift 7s ease-in-out infinite;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 100ms !important; animation-iteration-count: 1 !important; }
      .reveal { opacity: 1 !important; transform: none !important; }
      .meku-marquee-track { animation: none !important; }
      .big-cta { animation: none !important; }
    }
  </style>

    function IGIcon({ size = 18, color = '#fff' }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" aria-hidden="true">

    /* ─── APP ─── */
    function App() {
      React.useEffect(() => {
        // Reveal-on-scroll: add .reveal to all sections (skip the hero so it shows immediately)
        const sections = document.querySelectorAll('main > section');
        sections.forEach((sec, i) => { if (i > 0) sec.classList.add('reveal'); });
        const io = new IntersectionObserver((entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) {
              e.target.classList.add('is-visible');
              io.unobserve(e.target);
            }
          });
        }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });
        sections.forEach((s) => io.observe(s));

        // Heart burst on WhatsApp / big CTAs
        const emojis = ['💖','💕','✨','💗','🎀','💞'];
        const onClick = (ev) => {
          const a = ev.target.closest('a[href*="wa.me"], .big-cta, .meku-header-cta, .hero-cta-primary');
          if (!a) return;
          const rect = a.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top + rect.height / 2;
          for (let i = 0; i < 12; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart-particle';
            heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            heart.style.left = (cx + (Math.random() - 0.5) * 50) + 'px';
            heart.style.top  = (cy - 8) + 'px';
            heart.style.setProperty('--tx', ((Math.random() - 0.5) * 240) + 'px');
            heart.style.setProperty('--ty', (-140 - Math.random() * 100) + 'px');
            heart.style.setProperty('--rot', ((Math.random() - 0.5) * 90) + 'deg');
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1500);
          }
        };
        document.addEventListener('click', onClick);

        return () => {
          io.disconnect();
          document.removeEventListener('click', onClick);
        };
      }, []);

      return (
        <main>
          <Header />
          <Hero />
          <Sobre />
          <Hacemos />
          <Marquee />
          <Instagram />
          <Visitanos />
          <Contact />
          <Footer />
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <!-- Meta Pixel — Contact event on WhatsApp click -->
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    var waLinks = document.querySelectorAll('a[href*="wa.me"], a[href*="api.whatsapp.com"], a[href*="wa.link"]');
    waLinks.forEach(function(link) {
      link.addEventListener('click', function() {
        if (typeof fbq === 'function') {
          fbq('track', 'Contact', {
            content_name: 'whatsapp_click',
            content_category: link.dataset.category || 'general'
          });
        }
      });
    });
  });
  </script>
